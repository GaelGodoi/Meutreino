function carregarEstado(){divisao=localStorage.getItem('divisao')||getPerfil().divisao||'ABC';treinoAtual=localStorage.getItem('treinoAtual')||letrasDiv()[0];treinos=JSON.parse(localStorage.getItem('treinos_v16')||'null')||gerarTreinos(getPerfil());dataInicioTexto.textContent=brDate(localStorage.getItem('dataInicio'));configNome.value=localStorage.getItem('nomeUsuario')||'';configDataInicio.value=localStorage.getItem('dataInicio')||'';timerAtivo.value=localStorage.getItem('timerAtivo')||'sim';timerSom.value=localStorage.getItem('timerSom')||'sim';metaPeso.value=localStorage.getItem('metaPeso')||'';renderAll()}function renderAll(){renderBadges();renderTreino();renderPRs();renderPeso();renderSemana();renderSelects();renderTimer();setupDragTimer()}function renderBadges(){treinoBadges.innerHTML='';letrasDiv().forEach(l=>treinoBadges.innerHTML+=`<button class="badge ${l===treinoAtual?'active':''}" onclick="mudarTreino('${l}')">${l}</button>`)}function mudarTreino(l){treinoAtual=l;localStorage.setItem('treinoAtual',l);renderBadges();renderTreino();setTimer(recommendedForCurrent(),false)}function renderProgresso(){let t=treinos[treinoAtual];if(!t)return;let total=t.exercicios.length,done=t.exercicios.filter(ex=>localStorage.getItem('feito_'+treinoAtual+'_'+ex.id)==='sim').length,pct=total?Math.round(done/total*100):0;progressoTreino.innerHTML=`<div class="progress-wrap"><div class="progress-top"><span>${done}/${total} exercícios concluídos</span><b>${pct}%</b></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>`;if(total&&done===total){/* histórico só ao finalizar treino */}}
function renderTreino(){let t=treinos[treinoAtual];if(!t)return;tituloTreino.textContent=t.titulo+` · ${t.tempo} min`;avisoAdaptacao.innerHTML=t.aviso?`<div class="security-note">⚠ ${t.aviso}</div>`:'';listaExercicios.innerHTML='';t.exercicios.forEach((ex,i)=>{let id=treinoAtual+'_'+ex.id,cargaKey='carga_'+id,prKey='pr_'+id,feitoKey='feito_'+id,carga=localStorage.getItem(cargaKey)||'',feito=localStorage.getItem(feitoKey)==='sim';let term=Object.keys(TERMOS).filter(k=>String(ex.reps).toLowerCase().includes(k)).map(k=>`<span class="info-chip" onclick="openModal('${k.toUpperCase()}','${TERMOS[k]}')">?</span>`).join('');let grip=ex.pegada?`<div class="grip-inline" onclick="abrirPegada('${ex.pegada}')"><img class="grip-card-img" src="grip-${ex.pegada}.png"><span>Pegada: <b>${ex.pegada}</b></span></div>`:'';let tags=`<div class="tag-row"><span class="tag">${ex.tipo}</span><span class="tag">${ex.equip}</span><span class="tag">Descanso ${ex.descanso}s</span></div>`;listaExercicios.innerHTML+=`<div class="exercise" id="card_${safe(id)}"><div class="exercise-row"><button class="check ${feito?'done':''}" onclick="toggleFeito('${feitoKey}',this,${i})">${feito?'✓':''}</button><div class="exercise-main"><div class="exercise-title">${i+1}. ${ex.nome}</div><div class="reps">${ex.series} séries x ${ex.reps} ${term}</div>${tags}${grip}${adaptText(ex)}<div class="input-line"><span>Carga</span><input value="${carga}" onchange="salvarCarga('${ex.nome}','${cargaKey}','${prKey}',this.value,'${safe(id)}')"></div><div class="actions"><button class="btn-red" onclick="abrirVideo('${ex.youtube}')">Ver execução</button><button class="btn-dark" onclick="detalhes('${treinoAtual}',${i})">Detalhes</button></div><div id="medal_${safe(cargaKey)}"></div></div></div></div>`});cardioTreino.classList.toggle('done',localStorage.getItem('cardio_'+treinoAtual)==='sim');cardioTreino.innerHTML=`${t.cardio.texto} <span class="info-chip" onclick="openModal('Cardio','${t.cardio.info}')">?</span>`;renderProgresso();setTimer(recommendedForCurrent(),false)}function adaptText(ex){let p=getPerfil(),msg=[];(p.limitacoes||[]).forEach(l=>{if(ex.limitacoes[l]&&ex.limitacoes[l]<0)msg.push('Atenção para '+l+': use amplitude confortável e carga moderada.')});return msg.length?`<div class="adapt">⚠ ${msg.join(' ')}</div>`:''}function detalhes(treino,idx){let ex=treinos[treino].exercicios[idx],extra=`<div class="history-item"><span>Músculos principais</span><b>${ex.musculos.join(', ')}</b></div><div class="history-item"><span>Secundários</span><b>${ex.secundarios.join(', ')||'—'}</b></div><div class="history-item"><span>Tipo</span><b>${ex.tipo}</b></div><div class="history-item"><span>Equipamento</span><b>${ex.equip}</b></div><div class="history-item"><span>Descanso</span><b>${ex.descanso}s</b></div><p class="small"><b>Execução:</b> ${ex.execucao}</p><p class="small"><b>Erro comum:</b> ${ex.erros}</p>`;openModal(ex.nome,'Mini guia do exercício.',extra)}function abrirPegada(p){let txt={pronada:'Palmas para baixo/para frente.',supinada:'Palmas para cima/para você.',neutra:'Palmas uma de frente para a outra.'}[p]||'Tipo de pegada.';openModal('Pegada '+p,txt,`<img class="grip-img" src="grip-${p}.png">`)}function abrirVideo(q){window.open('https://www.youtube.com/results?search_query='+encodeURIComponent(q),'_blank')}function toggleFeito(key,btn,idx){let on=localStorage.getItem(key)==='sim';if(on){localStorage.removeItem(key);btn.className='check';btn.textContent='';localStorage.removeItem('treinoConcluido_'+treinoAtual)}else{localStorage.setItem(key,'sim');btn.className='check done';btn.textContent='✓';let next=recommendedForIndex(idx+1);if(next){setTimer(next,false);toast(`Descanso sugerido para o próximo: ${next}s`)}}renderProgresso();renderSemana()}function recommendedForCurrent(){let t=treinos[treinoAtual];if(!t)return 90;let idx=t.exercicios.findIndex(ex=>localStorage.getItem('feito_'+treinoAtual+'_'+ex.id)!=='sim');return idx>=0?t.exercicios[idx].descanso:(t.exercicios[0]?.descanso||90)}function recommendedForIndex(idx){let t=treinos[treinoAtual];return t?.exercicios[idx]?.descanso||null}
function salvarCarga(nome,cargaKey,prKey,valor,cardId){let n=num(valor),base='baseline_'+prKey,medal=document.getElementById('medal_'+safe(cargaKey));localStorage.setItem(cargaKey,valor);if(medal)medal.innerHTML='';if(isNaN(n)){renderPRs();return}if(localStorage.getItem(base)===null||localStorage.getItem(prKey)===null){localStorage.setItem(base,String(n));localStorage.setItem(prKey,String(n));renderPRs();return}let old=parseFloat(localStorage.getItem(prKey)||'0');if(n>old){localStorage.setItem(prKey,String(n));let h=JSON.parse(localStorage.getItem('historicoPR')||'[]');h.push({data:new Date().toLocaleDateString('pt-BR'),nome,peso:n});localStorage.setItem('historicoPR',JSON.stringify(h));if(medal)medal.innerHTML=`<div class="medal">🏆 Novo PR! ${nome}: ${n}kg</div>`;let card=document.getElementById('card_'+cardId);if(card){card.classList.add('pr-glow');setTimeout(()=>card.classList.remove('pr-glow'),1500)}toast(`🏆 Novo PR — ${nome}: ${n}kg`);vibrar([80,50,130])}renderPRs()}
function setTimer(s,announce=true){timerSec=s;updateTimer(s);timerHint.textContent=`Descanso sugerido: ${s}s`;if(announce)toast(`⏱ Descanso ajustado — ${s}s`)}function updateTimer(s){timerText.textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}function startTimer(){if('Notification'in window&&Notification.permission==='default'){Notification.requestPermission()}clearInterval(timerInterval);let s=timerSec||90;updateTimer(s);toast(`Descanso iniciado — ${s}s`);timerInterval=setInterval(()=>{s--;updateTimer(s);if(s<=0){clearInterval(timerInterval);if((localStorage.getItem('timerSom')||'sim')==='sim')beep();vibrar([120,70,120]);if('Notification'in window&&Notification.permission==='granted'){try{new Notification('Meu Treino',{body:'Descanso finalizado.'})}catch(e){}}toast('Descanso finalizado.')}},1000)}function stopTimer(){clearInterval(timerInterval);updateTimer(timerSec||90)}function renderTimer(){timerFloat.classList.toggle('hidden',(localStorage.getItem('timerAtivo')||'sim')!=='sim'||pageTreino.classList.contains('hidden'))}function setupDragTimer(){timerFloat.onpointerdown=(ev)=>{if(ev.target.tagName==='BUTTON')return;dragState={x:ev.clientX,y:ev.clientY,left:timerFloat.offsetLeft,top:timerFloat.offsetTop};timerFloat.setPointerCapture(ev.pointerId)};timerFloat.onpointermove=(ev)=>{if(!dragState)return;let nx=dragState.left+(ev.clientX-dragState.x),ny=dragState.top+(ev.clientY-dragState.y);nx=Math.max(8,Math.min(window.innerWidth-timerFloat.offsetWidth-8,nx));ny=Math.max(8,Math.min(window.innerHeight-timerFloat.offsetHeight-80,ny));timerFloat.style.left=nx+'px';timerFloat.style.right='auto';timerFloat.style.top=ny+'px';timerFloat.style.bottom='auto';timerFloat.style.width='calc(100% - 24px)';timerFloat.style.maxWidth='360px'};timerFloat.onpointerup=()=>{dragState=null}}
function renderSelects(){editTreino.innerHTML=letrasDiv().map(l=>`<option value="${l}">Treino ${l}</option>`).join('');editTreino.value=treinoAtual;renderEditor()}function renderEditor(){let l=editTreino.value||treinoAtual,t=treinos[l];if(!t)return;editExercicio.innerHTML=t.exercicios.map((e,i)=>`<option value="${i}">${i+1}. ${e.nome}</option>`).join('');carregarEditor()}function carregarEditor(){let l=editTreino.value||treinoAtual,i=parseInt(editExercicio.value||0),ex=treinos[l]?.exercicios[i];editNome.value=ex?ex.nome:'';editSeries.value=ex?ex.series:'';editReps.value=ex?ex.reps:''}function salvarEdicao(){let l=editTreino.value,i=parseInt(editExercicio.value||0),ex=treinos[l].exercicios[i];ex.nome=editNome.value;ex.series=editSeries.value;ex.reps=editReps.value;saveTreinos();renderTreino();toast('Exercício atualizado.')}function removerExercicio(){openModal('Remover exercício','Tem certeza?',`<div class="confirm-actions"><button class="btn-dark" onclick="fecharModal()">Cancelar</button><button class="btn-red" onclick="confirmarRemover()">Remover</button></div>`)}function confirmarRemover(){let l=editTreino.value,i=parseInt(editExercicio.value||0);treinos[l].exercicios.splice(i,1);saveTreinos();fecharModal();renderAll()}


function hojeKey(){return new Date().toISOString().slice(0,10)}
function sessaoKey(prefix, treino){return prefix+"_"+hojeKey()+"_"+treino}
function registroUnico(arr,key){return arr.some(x=>x.key===key)}
function limparChecksDoTreino(treino){
 let t=treinos[treino]; if(!t)return;
 t.exercicios.forEach(ex=>localStorage.removeItem("feito_"+treino+"_"+ex.id));
 localStorage.removeItem("treinoConcluido_"+treino);
}
function estadoConclusaoTreino(){
 let t=treinos[treinoAtual]; if(!t)return {total:0,done:0,missing:0};
 let total=t.exercicios.length;
 let done=t.exercicios.filter(ex=>localStorage.getItem("feito_"+treinoAtual+"_"+ex.id)==="sim").length;
 return {total,done,missing:total-done};
}
function registrarTreinoSessao(forcarNova){
 let st=estadoConclusaoTreino();
 let baseKey=sessaoKey("treino",treinoAtual);
 let h=JSON.parse(localStorage.getItem("historicoTreinos")||"[]");
 if(registroUnico(h,baseKey) && !forcarNova){
   openModal("Treino já registrado","Você já finalizou este treino hoje. Deseja registrar uma nova sessão mesmo assim?",
   `<div class="confirm-actions"><button class="btn-dark" onclick="fecharModal()">Cancelar</button><button class="btn-yellow" onclick="fecharModal();registrarTreinoSessao(true)">Registrar nova sessão</button></div>`);
   return;
 }
 let key=forcarNova ? baseKey+"_"+Date.now() : baseKey;
 h.push({key,data:new Date().toLocaleDateString("pt-BR"),treino:treinoAtual,exercicios:st.done,total:st.total});
 localStorage.setItem("historicoTreinos",JSON.stringify(h));
 limparChecksDoTreino(treinoAtual);
 toast("✅ Treino finalizado e enviado para Evolução!");
 vibrar([80,50,120]);
 renderTreino();renderSemana();
}
function finalizarTreinoAtual(confirmarIncompleto){
 let st=estadoConclusaoTreino();
 if(st.done===0){
   openModal("Finalizar treino","Você ainda não marcou nenhum exercício como feito. Marque os exercícios concluídos antes de finalizar.");
   return;
 }
 if(st.missing>=3){
   openModal("Treino incompleto",`Ainda faltam ${st.missing} exercícios. Finalize depois de concluir a maior parte do treino.`);
   return;
 }
 if(st.missing>0 && st.missing<=2 && !confirmarIncompleto){
   openModal("Finalizar mesmo assim?",`Faltam ${st.missing} exercício(s) para concluir. Deseja finalizar mesmo assim?`,
   `<div class="confirm-actions"><button class="btn-dark" onclick="fecharModal()">Cancelar</button><button class="btn-yellow" onclick="fecharModal();finalizarTreinoAtual(true)">Finalizar</button></div>`);
   return;
 }
 registrarTreinoSessao(false);
}
function registrarCardioSessao(forcarNova){
 let baseKey=sessaoKey("cardio",treinoAtual);
 let h=JSON.parse(localStorage.getItem("historicoCardio")||"[]");
 if(registroUnico(h,baseKey) && !forcarNova){
   openModal("Cardio já registrado","Você já registrou este cardio hoje. Deseja registrar uma nova sessão mesmo assim?",
   `<div class="confirm-actions"><button class="btn-dark" onclick="fecharModal()">Cancelar</button><button class="btn-yellow" onclick="fecharModal();registrarCardioSessao(true)">Registrar novo cardio</button></div>`);
   return;
 }
 let key=forcarNova ? baseKey+"_"+Date.now() : baseKey;
 h.push({key,data:new Date().toLocaleDateString("pt-BR"),treino:treinoAtual});
 localStorage.setItem("historicoCardio",JSON.stringify(h));
 localStorage.removeItem("cardio_"+treinoAtual);
 toast("✅ Cardio concluído e enviado para Evolução!");
 vibrar(80);
 renderTreino();renderSemana();
}
function concluirCardio(){
 registrarCardioSessao(false);
}
function renderSemana(){let ht=JSON.parse(localStorage.getItem('historicoTreinos')||'[]'),hc=JSON.parse(localStorage.getItem('historicoCardio')||'[]'),p=getPerfil(),metaTreinos=Object.values(p.dias||{}).filter(v=>Number(v)>0).length||3,metaCardio=metaTreinos;resumoSemana.innerHTML=`<div class="history-item"><span>Treinos concluídos</span><b>${ht.length}/${metaTreinos}</b></div><div class="history-item"><span>Cardios concluídos</span><b>${hc.length}/${metaCardio}</b></div><div class="history-item"><span>Streak leve</span><b>🔥 ${Math.min(ht.length,7)} dias</b></div><p class="small">A meta respeita os dias que você informou. Nada de cobrança fora da sua realidade.</p>`}function salvarPeso(){if(!pesoAtual.value){openModal('Atenção','Preencha o peso atual.');return}localStorage.setItem('pesoAtualUltimo',pesoAtual.value);let h=JSON.parse(localStorage.getItem('historicoPeso')||'[]');h.push({data:new Date().toLocaleDateString('pt-BR'),peso:pesoAtual.value});localStorage.setItem('historicoPeso',JSON.stringify(h));renderPeso();toast('Peso salvo.')}function renderPeso(){metaPeso.value=localStorage.getItem('metaPeso')||'';pesoAtual.value=localStorage.getItem('pesoAtualUltimo')||'';let h=JSON.parse(localStorage.getItem('historicoPeso')||'[]');historicoPeso.innerHTML=h.slice().reverse().map(x=>`<div class="history-item"><span>${x.data}</span><b>${x.peso}kg</b></div>`).join('');let c=graficoPeso,ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#0e0e12';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#a1a1aa';ctx.fillText(h.length<2?'Salve 2 pesos para gerar o gráfico.':'Evolução registrada.',55,95)}function renderPRs(){let keys=Object.keys(localStorage).filter(k=>k.startsWith('pr_')),hist=JSON.parse(localStorage.getItem('historicoPR')||'[]');listaPRs.innerHTML=`<div class="history-item"><span>Exercícios com carga</span><b>${keys.length}</b></div><div class="history-item"><span>Progressões reais</span><b>${hist.length}</b></div>`+(hist.length?'<h3 style="margin-top:12px">Últimas progressões</h3>'+hist.slice(-5).reverse().map(i=>`<div class="history-item"><span>🏆 ${i.nome}</span><b>${i.peso}kg</b></div>`).join(''):`<p class="small">A primeira carga vira referência. O PR aparece quando você supera essa carga.</p>`)}function mostrarPagina(p){['Treino','Evolucao','Config'].forEach(x=>{document.getElementById('page'+x).classList.add('hidden');document.getElementById('nav'+x).classList.remove('active')});document.getElementById('page'+p).classList.remove('hidden');document.getElementById('nav'+p).classList.add('active');renderTimer();if(p==='Evolucao'){renderPRs();renderPeso();renderSemana()}if(p==='Config'){renderSelects()}window.scrollTo({top:0,behavior:'smooth'})}function proximoTreino(){limparChecksDoTreino(treinoAtual);let a=letrasDiv(),i=a.indexOf(treinoAtual);mudarTreino(a[(i+1)%a.length]);window.scrollTo({top:0,behavior:'smooth'})}function limparCargasProgressao(){openModal('Apagar cargas e progressões','Isso apaga cargas, PRs e exercícios marcados como feitos. O treino será mantido.',`<div class="confirm-actions"><button class="btn-dark" onclick="fecharModal()">Cancelar</button><button class="btn-red" onclick="confirmarLimpar()">Apagar</button></div>`)}function confirmarLimpar(){Object.keys(localStorage).forEach(k=>{if(k.startsWith('carga_')||k.startsWith('pr_')||k.startsWith('baseline_')||k.startsWith('feito_')||k.startsWith('treinoConcluido_')||k==='historicoPR')localStorage.removeItem(k)});fecharModal();renderAll();toast('Cargas e progressões apagadas.')}function refazerConfiguracao(){openModal('Refazer configuração','Isso apaga tudo e começa do zero.',`<div class="confirm-actions"><button class="btn-dark" onclick="fecharModal()">Cancelar</button><button class="btn-red" onclick="localStorage.clear();location.reload()">Refazer</button></div>`)}function iniciarApp(){if(localStorage.getItem('onboardingFeito')!=='sim'){setupOnboarding();onboarding.classList.remove('hidden');pageTreino.classList.add('hidden');pageEvolucao.classList.add('hidden');pageConfig.classList.add('hidden');return}carregarEstado();mostrarPagina('Treino');setTimer(recommendedForCurrent(),false)}iniciarApp();if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js');
</script></body></html>
